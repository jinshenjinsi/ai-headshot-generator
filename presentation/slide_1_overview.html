<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI头像生成器 - 命令使用指南</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #F2F2F2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 80px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        .left-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
        }
        
        .title {
            font-size: 64px;
            font-weight: 900;
            color: #000000;
            line-height: 1.2;
            letter-spacing: -2px;
        }
        
        .subtitle {
            font-size: 32px;
            color: #FF3B30;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .right-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 60px;
            margin-left: 60px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #333333;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }
        
        .features {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            color: #000000;
            font-weight: 500;
        }
        
        .feature-icon {
            font-size: 24px;
            color: #FF3B30;
            width: 30px;
            text-align: center;
        }
        
        .tech-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .tech-item {
            font-size: 14px;
            color: #333333;
            line-height: 1.6;
        }
        
        .tech-label {
            font-weight: 700;
            color: #000000;
        }
        
        .decorative-line {
            position: absolute;
            background: #FF3B30;
        }
        
        .line-1 {
            width: 4px;
            height: 200px;
            top: 100px;
            right: 120px;
        }
        
        .line-2 {
            width: 300px;
            height: 4px;
            bottom: 80px;
            left: 80px;
        }
        
        .dot {
            position: absolute;
            background: #FF3B30;
            border-radius: 50%;
        }
        
        .dot-1 {
            width: 12px;
            height: 12px;
            top: 60px;
            right: 80px;
        }
        
        .dot-2 {
            width: 8px;
            height: 8px;
            bottom: 120px;
            right: 60px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="left-section">
            <div class="title">AI头像<br>生成器</div>
            <div class="subtitle">命令使用指南</div>
        </div>
        
        <div class="right-section">
            <div>
                <div class="section-title">核心功能</div>
                <div class="features">
                    <div class="feature-item">
                        <div class="feature-icon">🎫</div>
                        <span>证照生成 - 快速生成各种证件照</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🎨</div>
                        <span>美照生成 - 10种专业艺术风格</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🔍</div>
                        <span>照片修复 - 超分辨率和智能补全</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">✨</div>
                        <span>图片调整 - 亮度、对比度、饱和度</span>
                    </div>
                </div>
            </div>
            
            <div>
                <div class="section-title">技术栈</div>
                <div class="tech-stack">
                    <div class="tech-item"><span class="tech-label">前端：</span>React Native 0.81 + Expo SDK 54</div>
                    <div class="tech-item"><span class="tech-label">后端：</span>Express.js + tRPC + Drizzle ORM</div>
                    <div class="tech-item"><span class="tech-label">数据库：</span>PostgreSQL (阿里云)</div>
                    <div class="tech-item"><span class="tech-label">部署：</span>PM2 (阿里云服务器)</div>
                </div>
            </div>
        </div>
        
        <div class="decorative-line line-1"></div>
        <div class="decorative-line line-2"></div>
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
    </div>
</body>
</html>
